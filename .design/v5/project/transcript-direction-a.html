<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=900" />
  <title>Transcript — Direction A (refined)</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="transcript-direction-a.css" />
  <style>
    html, body { background: var(--bg-0); margin: 0; }
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 0 40px;
    }
    .page-head {
      display: flex; align-items: baseline; gap: 12px;
      padding: 28px 36px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .page-head h1 {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-0);
      margin: 0;
      letter-spacing: -0.01em;
    }
    .page-head .sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
    }
    .legend {
      display: flex; gap: 22px;
      padding: 10px 36px 14px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-3);
      border-bottom: 1px dashed var(--border-1);
      margin-bottom: 8px;
    }
    .legend .swatch { display: inline-flex; align-items: center; gap: 7px; }
    .legend .sw-you {
      width: 18px; height: 10px;
      background: var(--bg-1);
      border: 1px solid var(--border-1);
      border-radius: 2px;
      position: relative;
    }
    .legend .sw-you::before {
      content: ''; position: absolute; left: 2px; top: 1px;
      width: 2px; height: 8px; background: var(--accent); border-radius: 1px;
    }
    .legend .sw-req {
      display: inline-block; width: 2px; height: 14px; background: var(--accent); border-radius: 1px;
    }
    .legend .sw-har {
      display: inline-block; width: 14px;
      color: var(--text-1);
      font-family: var(--font-mono);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-head">
      <h1>Direction A — refined</h1>
      <span class="sub">Turn 4 + Turn 7 · dark theme</span>
    </div>
    <div class="legend">
      <span class="swatch"><span class="sw-you"></span> YOU — boxed quote</span>
      <span class="swatch"><span class="sw-req"></span> REQUEST — accent spine</span>
      <span class="swatch"><span class="sw-har">↳</span> HARNESS — indented step</span>
    </div>
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="explorations-shared.jsx"></script>
  <script type="text/babel" src="transcript-direction-a.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<DirectionA />);
  </script>
</body>
</html>
