<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <title>Verify variants</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="explorations.css" />
  <style>
    html, body { background: #0a0b0e; overflow: auto; }
    .vrow { display: flex; gap: 24px; padding: 24px; align-items: flex-start; }
    .vrow > .frame {
      background: var(--bg-0);
      border: 1px solid var(--border-1);
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .frame.a { width: 760px; }
    .frame.b { width: 960px; }
    .frame.c { width: 760px; }
    .frame-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-2);
      padding: 8px 14px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border-1);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="explorations-shared.jsx"></script>
  <script type="text/babel" src="variant-a-quiet.jsx"></script>
  <script type="text/babel" src="variant-b-lanes.jsx"></script>
  <script type="text/babel" src="variant-c-document.jsx"></script>
  <script type="text/babel">
    const App = () => (
      <div className="vrow">
        <div className="frame a"><div className="frame-label">A · Quieter chrome</div><VariantA /></div>
        <div className="frame b"><div className="frame-label">B · Two-lane timeline</div><VariantB /></div>
        <div className="frame c"><div className="frame-label">C · Document / chat</div><VariantC /></div>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
